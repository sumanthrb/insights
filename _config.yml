title: "Sumanth Insights"
description: "Reimagining how systems are built in the age of AI and intelligent platforms."
author:
  name: "SUMANTH BATHULA"
  bio: "Engineering Leader. Cloud Strategist. AI Practitioner"
  github: "sumanthrb"
  linkedin: "sumanthb"
  email: "sumanthrb@gmail.com"

url: "https://sumanthrb.github.io"
baseurl: "/insights"

# Build settings
markdown: kramdown
highlighter: rouge
theme: null

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pagination
paginate: 6
paginate_path: "/page/:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
